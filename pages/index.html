<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D撲克動畫與遊戲平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 全域變數和基本樣式 */
        :root {
            --primary: #8B4513;
            --secondary: #D2691E;
            --accent: #FF6B6B;
            --light: #FFF8DC;
            --dark: #4A2C2A;
            --success: #28a745;
            --warning: #ffc107;
            --info: #17a2b8;
            --chocolate: #7B3F00;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* 全屏视频背景 */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .video-background video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 42, 0.7);
        }

        /* 載入指示器 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10001;
            color: white;
            transition: opacity 0.5s ease-in-out;
        }

        .spinner {
            border: 8px solid rgba(255, 255, 255, 0.3);
            border-top: 8px solid var(--accent);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1.5s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 覆蓋層與按鈕 */
        .fullscreen-overlay,
        .violation-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
            font-size: 24px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .fullscreen-overlay {
            transition: opacity 0.5s ease-in-out, visibility 0.5s ease-in-out;
        }

        .fullscreen-button,
        .violation-close-button {
            padding: 15px 30px;
            background: #ff6600;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .fullscreen-button:hover,
        .violation-close-button:hover {
            background: #ff8833;
            transform: scale(1.05);
        }

        /* 自訂警告視窗 */
        .violation-modal {
            display: none;
            z-index: 10000;
        }

        .violation-content {
            background: #2a2a40;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            max-width: 80%;
            border: 2px solid #ff6600;
            animation: modal-bounce 0.8s ease-in-out;
        }

        .violation-content h2 {
            font-size: 2rem;
            color: #ff6600;
            margin-bottom: 20px;
        }

        .violation-content p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .violation-close-button {
            padding: 12px 25px;
            font-size: 1rem;
        }
        
        @keyframes modal-bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }

        /* 內容區塊 */
        .content-wrapper {
            width: 100%;
            height: 100vh;
            position: relative;
            z-index: 10;
            overflow: hidden;
        }

        .centered-image {
            max-width: 90%;
            max-height: 90vh; /* 確保圖片不會太大 */
            height: auto;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            object-fit: contain; /* 確保圖片完整顯示，不被裁剪 */
        }

        /* 视频控制按鈕 */
        .video-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        .video-controls button {
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s;
        }

        .video-controls button:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        /* 內容保護徽章 */
        .protection-badge {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 15px;
            border-radius: 25px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            backdrop-filter: blur(5px);
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .protection-badge:hover {
            opacity: 1;
        }
    </style>

    <!-- ===== 1.html 依賴 ===== -->
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>無名牛排 POS 系統 V6.5.24</title>
    <!-- Tailwind CSS CDN -->
    <!-- 注意：Console 中的 Tailwind 警告是正常的，不影響功能 -->
    <!-- 這是單文件應用，使用 CDN 是最方便的方式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React 和 ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <style>
        /* 完全隱藏右側感應區塊和所有視覺元素 */
        .hide-right-stealth-trigger {
            display: none !important;
        }

        /* 自定義滾動條 */
        .custom-scrollbar::-webkit-scrollbar { width: 12px; height: 12px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 100px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 100px; border: 3px solid #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6366f1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* 前台主捲動區域：完全隱藏滾動條 */
        #front-main-scroll::-webkit-scrollbar { display: none !important; width: 0 !important; }
        #front-main-scroll { -ms-overflow-style: none !important; scrollbar-width: none !important; }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fade-in 0.5s ease-out; }
        @keyframes slow-zoom { 0% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .animate-slow-zoom { animation: slow-zoom 15s ease-out forwards; }
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            #root { display: none !important; }
            #print-container { display: block !important; position: fixed; top: 0; left: 0; width: 100%; }
            @page { margin: 2mm; size: 58mm auto; }
        }
        .glass-effect { background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.18); }

        /* 確保編輯模態框能完全覆蓋整個視口 */
        .z-\[99999\] {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 999999 !important;
        }

        @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        
        /* 自動跳轉高亮動畫 */
        @keyframes highlight-pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
            50% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0.3); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
        .auto-jump-highlight {
            animation: highlight-pulse 1s ease-out;
        }

        /* ===== RWD 自適應 - 改進版 ===== */
        :root { 
            font-size: clamp(9.6px, 1.2vw, 14.4px);
        }
        html, body { height: 100%; overflow: hidden; }
        #root { height: 100%; overflow: hidden; display: flex; flex-direction: column; }

        /* 滑鼠滾輪控制 main 滾動 */
        main.wheel-scroll-target {
            scroll-behavior: smooth;
        }

        /* 中等螢幕調整 */
        @media (max-width: 1024px) {
            :root { font-size: clamp(8.8px, 1.44vw, 13.6px); }
        }
        
        /* 小螢幕縮放調整 */
        @media (max-width: 768px) {
            :root { font-size: clamp(8px, 1.76vw, 12.8px); }
        }
        
        /* 極小螢幕 */
        @media (max-width: 480px) {
            :root { font-size: clamp(7.2px, 2.24vw, 11.2px); }
        }
        
        /* 大螢幕優化 */
        @media (min-width: 1920px) {
            :root { font-size: clamp(11.2px, 0.96vw, 16px); }
        }
        
        /* 確保按鈕文字不換行 */
        .whitespace-nowrap {
            white-space: nowrap !important;
        }
        
        /* 底部導航欄響應式調整 */
        @media (max-width: 1280px) {
            .bottom-nav-container {
                padding: 1.5rem !important;
            }
        }
        
        @media (max-width: 1024px) {
            .bottom-nav-container {
                padding: 1rem !important;
            }
        }
        
        /* 選項網格響應式調整 */
        @media (max-width: 1280px) {
            .options-grid {
                gap: 1.5rem !important;
            }
        }
        
        @media (max-width: 1024px) {
            .options-grid {
                gap: 1rem !important;
            }
        }
        
        @media (max-width: 768px) {
            .options-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div class="fullscreen-overlay" id="fullscreen-overlay" style="display:none">
        <button class="fullscreen-button" id="fullscreen-button">進入全螢幕</button>
    </div>

    <div class="violation-modal" id="violation-modal">
        <div class="violation-content">
            <h2><i class="fas fa-exclamation-circle"></i></h2>
            <p></p>
            <button class="violation-close-button" id="violation-close-button">確定</button>
        </div>
    </div>

    <div class="video-background">
        <video id="bg-video" autoplay muted loop playsinline>
            <source src="https://assets.codepen.io/3364143/sample.mp4" type="video/mp4">
            您的瀏覽器不支持視頻播放。
        </video>
        <div class="video-overlay"></div>
    </div>

    <div class="video-controls">
        <button id="mute-toggle" title="靜音/取消靜音">
            <i class="fas fa-volume-mute"></i>
        </button>
        <button id="pause-play" title="暫停/播放">
            <i class="fas fa-pause"></i>
        </button>
    </div>

    <div class="content-wrapper" id="contentWrapper">
        <div id="root"></div>
    <div id="print-container" style="display:none"></div>
    <script src="pos-app.js"></script>
    </div>

    <div class="protection-badge">
        <i class="fas fa-shield-alt"></i>
    </div>

</body>
</html>
